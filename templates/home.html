<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointmnet Guru</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .centered-div {
            width: 50%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* Add some animations and transitions */
        .btn {
            transition: background-color 0.5s, color 0.5s, transform 0.5s;
        }
        .btn:hover {
            background-color: #3e8e41;
            color: #fff;
            transform: scale(1.1);
        }
        .btn:active {
            transform: scale(0.9);
        }
        .btn:not(:hover) {
            transform: scale(0.9);
        }
        h1 {
            animation: fade-in 2s;
        }
        @keyframes fade-in {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
        /* Add some animations to the buttons */
        .btn {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 rgba(0, 0, 0, 0.2);
            }
            100% {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            }
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <h1>Welcome To<br>Appointment Guru</h1>
    <div class="centered-div">
        <a href="userLogin"><button type="button" class="btn btn-success">User Login</button></a>&nbsp;
        <a href="doctorLogin"><button type="button" class="btn btn-success">Doctor Login</button></a>&nbsp;
        <a href="add_user"><button type="button" class="btn btn-success">User Signup</button></a>&nbsp;
        <a href="add_doctor"><button type="button" class="btn btn-success">Doctor Signup</button></a>&nbsp;
    </div>
</body>
</html>
