<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
    rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
    crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book doctor</title>
    <style>
        .btn {
            background-color: #006E86;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #006F94;
        }

        .btn-danger {
            background-color: #006E86;
        }

        .btn-danger:hover {
            background-color: #006E86;
        }

        body {
            font-family: Arial, sans-serif;
        }

        form {
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-bottom: 10px;
        }

        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #3e8e41;
        }

        table {
            border-collapse: collapse;
            width: 80%;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
            transition: background-color 0.3s ease;
        }

        th {
            background-color: #fff;
            color: #333;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ddd;
        }

        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 15px;
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-light">
        <div class="container-fluid">
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
              <a class="nav-link" href="{% url 'yourAppointments' %}"><button class='btn btn-danger'>Your Appointments</button></a>
              <a class="nav-link" href="{% url 'bookAppointment' %}"><button class='btn btn-danger'>Book Appointments</button></a>
              {% comment %} <a class="nav-link" href="{% url 'userEditDetails' %}"><button class='btn btn-danger'>Edit Details</button></a> {% endcomment %}
            </div>
          </div>
        </div>
        <a class="navbar-brand" href="{% url 'home' %}"><button class='btn btn-danger'>Logout</button></a>
    </nav>
    <form action="{% url 'bookAppointment' %}" method="post">
        {% csrf_token %}
        <label for="hosName">Choose the Hospital Name:</label>
        <select name="hosName" id="hosName">
            <option value="None">None</option>
            <option value="star hospitals">Star Hospitals</option>
            <option value="yashoda hospitals">Yashoda Hospitals</option>
            <option value="apollo hospitals">Apollo Hospitals</option>
            <option value="kim's hospitals">Kim's Hospitals</option>
            <option value="care hospitals">Care Hospitals</option>
        </select>
        <span id="selected-hosName"></span>
        <br>
        <label for="branch">Choose the Hospital Location:</label>
        <select name="branch" id="branch">
            <option value="None">None</option>
            <option value="banjara Hills">Banjara Hills</option>
            <option value="secunderabad">Secunderabad</option>
            <option value="jubilee Hills">Jubilee Hills</option>
            <option value="malakpet">Malakpet</option>
            <option value="gachibowli">Gachibowli</option>
        </select>
        <span id="selected-branch"></span>
        <br>
        <label for="specialization">Choose Specialisation:</label>
        <select name="specialization" id="specialization">
            <option value="None">None</option>
            <option value="oncology">Oncology</option>
            <option value="nephrology">Nephrology</option>
            <option value="neurology">Neurology</option>
            <option value="cardiology">Cardiology</option>
            <option value="gastroenterology">Gastroenterology</option>
        </select>
        <span id="selected-specialization"></span>
        <br>
        <input type="submit" value="Filter">
    </form>

    <div class="table-responsive" align='center'>
        <table class="table table-striped table-bordered">
            <thead>
                <tr style="text-align: center">
                    <th> Doctor Name </th>
                    <th> Hospital Name </th>
                    <th> Branch </th>
                    <th> Specialisation </th>
                    <th> Appointment Slots </th>
                </tr>
            </thead>
            <tbody>
                {% for doctor in doctors %}
                <tr style="text-align: center">
                    <td>{{doctor.doctorName}}</td>
                    <td>{{doctor.hospitalName}}</td>
                    <td>{{doctor.branch}}</td>
                    <td>{{doctor.specialisation}}</td>
                    <td>{{doctor.time}}</td>
                    <td><a href={% url "selectSlot" doctor.phoneNumber %}><button type="button" class="btn btn-success">Book Appointment</button></a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
