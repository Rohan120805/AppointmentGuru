<!DOCTYPE html>
<html>
<head>
    <title>Select Slot</title>
    <style>
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        select {
            padding: 10px 15px;
        }
        
        .btn-book {
            width: 100%;
            height: 40px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-book:hover {
            background-color: #3e8e41;
        }
        
        .error {
            color: #f44336;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Doctor Phone Number: {{ phoneNumber }}</h1>
        <form action="{% url 'selectSlot' phoneNumber %}" method='post' class="appointment-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="appointmentDate">Select Date:</label>
                <input type="date" name="appointmentDate" value="{{ tomorrow|date:"Y-m-d" }}" min="{{ tomorrow|date:"Y-m-d" }}" required>
            </div>
            <div class="form-group">
                <label for="slot">Select Slot:</label>
                <select name="slot" required>
                    {% for slot in slots %}
                    <option value="{{ slot }}">{{ slot }}</option>
                    {% endfor %}
                </select>
            </div>
            <input type="submit" value="Book Slot" class="btn-book">
        </form>
    </div>
</body>
</html>
