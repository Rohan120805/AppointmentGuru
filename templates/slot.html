<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .appointment-form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
        }
        
        input[type="date"], select {
            width: 100%;
            height: 40px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        select {
            padding: 10px 15px;
        }
        
        .btn-book {
            width: 100%;
            height: 40px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-book:hover {
            background-color: #3e8e41;
        }
        
        .error {
            color: #f44336;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Doctor Phone Number: {{ phoneNumber }}</h1>
        <form action="{% url 'selectSlot' phoneNumber %}" method='post' class="appointment-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="appointmentDate">Select Date:</label>
                <input type="date" name="appointmentDate" value="{{ tomorrow }}" min="{{ tomorrow }}" required>
            </div>
            <div class="form-group">
                <label for="slot">Select Slot:</label>
                <select name="slot" required>
                    {% for slot in avSlots %}
                    <option value="{{ slot }}">{{ slot }}</option>
                    {% endfor %}
                </select>
            </div>
            <input type="submit" value="Book Slot" class="btn-book">
        </form>
    </div>
</body>
</html>
